<header
  class="flex items-center sticky top-0 z-50 justify-between px-4 py-2 border-b bg-gray-50 border-gray-200"
>
  <!-- Website logo  -->
  <div class="flex items-center gap-2">
    <a href="/">
      <img
        src="../assets/images/studentoo-site-logo.webp"
        width="150"
        alt="Studentoo Logo"
        decoding="async"
        class="w-auto h-8"
      />
    </a>
  </div>

  <!-- Desktop Navbar -->
  <div class="hidden xl:block">
    <nav>
      <ul
        class="flex items-center bg-white backdrop-blur-sm p-1 rounded-full border border-gray-100 shadow-xs"
      >
        <li>
          <a
            href="/"
            class="px-4 py-2 rounded-full text-[14px] font-semibold transition-all duration-300 ease-in-out block {% if page.url == '/' %} text-blue-700 bg-blue-50 {% else %} text-gray-800 hover:text-blue-700 {% endif %}"
          >
            Home
          </a>
        </li>
        <li>
          <a
            href="/sgpa-calculator/"
            class="px-4 py-2 rounded-full text-[14px] font-semibold transition-all duration-300 ease-in-out block {% if page.url == '/sgpa-calculator/' %} text-blue-700 bg-blue-50 {% else %} text-grey-800 hover:text-blue-700 {% endif %}"
          >
            SGPA Calculator
          </a>
        </li>
        <li>
          <a
            href="/cgpa-calculator/"
            class="px-4 py-2 rounded-full text-[14px] font-semibold transition-all duration-300 ease-in-out block {% if page.url == '/cgpa-calculator/' %} text-blue-700 bg-blue-50 {% else %} text-gray-800 hover:text-blue-700 {% endif %}"
            >CGPA Calculator</a
          >
        </li>
        <li>
          <a
            href="/calculator-for-university/"
            class="px-4 py-2 rounded-full text-[14px] font-semibold transition-all duration-300 ease-in-out block {% if page.url == '/calculator-for-university/' %} text-blue-700 bg-blue-50 {% else %} text-gray-800 hover:text-blue-700 {% endif %}"
            >University Calculator</a
          >
        </li>
        <li>
          <a
            href="/faq/"
            class="px-4 py-2 rounded-full text-[14px] font-semibold transition-all duration-300 ease-in-out block {% if page.url == '/faq/' %} text-blue-700 bg-blue-50 {% else %} text-gray-800 hover:text-blue-700 {% endif %}"
            >FAQs</a
          >
        </li>

        <!-- Legal Dropdown - Legal Pages  -->
        <li class="relative group" id="legal-dropdown">
          <button
            aria-label="Legal Links"
            id="legal-links"
            class="flex items-center gap-1 px-4 py-2 rounded-full text-[14px] font-semibold transition-all duration-300 ease-in-out cursor-pointer"
          >
            Legal
            <iconify-icon
              id="dropdown-icon"
              icon="ion:chevron-down"
              aria-hidden="true"
              class="transition-transform duration-300"
            >
            </iconify-icon>
          </button>

          <!-- Dropdown Menu  -->
          <div
            role="menu"
            id="dropdown-menu"
            class="absolute right-0 mt-2 w-56 bg-white border border-gray-100 rounded-2xl shadow-xl py-2 transition-all duration-300 z-100"
          >
            <a
              href="/about-us/"
              class="px-4 py-2 text-[14px] font-medium transition-colors duration-200 block"
            >
              About Us
            </a>
            <a
              href="/contact-us/"
              class="px-4 py-2 text-[14px] font-medium transition-colors duration-200 block"
            >
              Contact Us
            </a>
            <a
              href="/terms-and-conditions/"
              class="px-4 py-2 text-[14px] font-medium transition-colors duration-200 block"
            >
              Terms and Conditions
            </a>
            <a
              href="/privacy-policy/"
              class="px-4 py-2 text-[14px] font-medium transition-colors duration-200 block"
            >
              Privacy & Policy
            </a>
            <a
              href="/disclaimer/"
              class="px-4 py-2 text-[14px] font-medium transition-colors duration-200 block"
            >
              Disclaimer
            </a>
          </div>
        </li>
      </ul>
    </nav>
  </div>

  <!-- Search Bar and Mobile Menu Icon  -->
  <div class="flex items-center gap-4">
    <!-- Search Bar  -->
    <button
      aria-label="Search calculators and pages"
      class="flex items-center gap-3 min-h-10 w-10 md:w-auto px-0 md:px-4 bg-white hover:bg-gray-50 transition-all cursor-pointer border border-blue-200/50 rounded-lg shadow-sm group md:min-w-[240px] justify-center md:justify-start"
    >
      <iconify-icon
        icon="ion:search-outline"
        class="text-blue-600 text-xl md:text-lg group-hover:scale-110 transition-transform"
      ></iconify-icon>
      <span
        class="hidden md:block text-gray-600 text-[14px] font-semibold flex-1 text-left"
      >
        Search...
      </span>
      <div
        class="hidden md:flex items-center gap-1 px-1.5 py-0.5 bg-gray-100 border border-gray-200 rounded-md text-gray-600 text-[10px] font-bold shadow-xs"
      >
        <span class="text-[12px]">⌘</span>
        <span>K</span>
      </div>
    </button>

    <!-- Mobile Menu Icon  -->
    <button
      aria-label="Open menu"
      id="open-menu"
      class="xl:hidden text-2xl text-gray-700"
    >
      <iconify-icon
        icon="heroicons-solid:menu-alt-3"
        aria-hidden="true"
      ></iconify-icon>
    </button>
  </div>

  <!-- Sidebar Overlay  -->
  <div
    class="fixed inset-0 bg-black/50 z-40 transition-opacity duration-300"
    id="sidebar-overlay"
  >
    <div
      class="fixed top-0 right-0 h-full w-[250px] bg-white z-50 shadow-lg transform transition-transform duration-300 ease-in-out"
      id="sidebar"
    >
      <div
        class="p-4 flex justify-between items-center border-b border-gray-100"
      >
        <span class="font-bold text-lg text-gray-800">Menu</span>
        <button
          aria-label="Close menu"
          class="text-2xl text-gray-600 hover:text-red-500 transition-colors"
          id="close-menu"
        >
          <iconify-icon icon="ion:close" aria-hidden="true"></iconify-icon>
        </button>
      </div>

      <!-- Mobile Navbar Links  -->
      <div class="p-4 flex flex-col gap-2 overflow-y-auto h-[calc(100%-60px)]">
        <a
          href="/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >Home</a
        >
        <a
          href="/sgpa-calculator/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/sgpa-calculator/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >SGPA Calculator</a
        >
        <a
          href="/cgpa-calculator/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/cgpa-calculator/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >CGPA Calculator</a
        >
        <a
          href="/calculator-for-university/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/calculator-for-university/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >University Calculator</a
        >
        <a
          href="/faq/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/faq/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >FAQs</a
        >
        <a
          href="/about-us/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/about-us/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >About Us</a
        >
        <a
          href="/contact-us/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/contact-us/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >Contact Us</a
        >
        <a
          href="/terms-and-conditions/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/terms-and-conditions/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >Terms and Conditions</a
        >
        <a
          href="/privacy-policy/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '/privacy-policy/' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >Privacy & Policy</a
        >
        <a
          href="/disclaimer/"
          class="px-3 py-2 rounded-lg text-[15px] font-medium transition-colors duration-200 {% if page.url == '' %} text-blue-700 bg-blue-50 {% else %} text-grey-700 hover:text-blue-700 hover:bg-gray-50 {% endif %}"
          >Disclaimer</a
        >
      </div>
    </div>
  </div>
</header>
